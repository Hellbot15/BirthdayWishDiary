<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>For My Cutie Pie</title>

  <!-- Handwritten + display fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Quicksand:wght@400;600&display=swap"
    rel="stylesheet">

  <!-- jQuery + turn.js + confetti -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="turn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --bg1: #080814;
      --bg2: #0f1020;
      --page-paper: #0f1220;
      --ink: #f8eefe;
      --accent: #ff8fd3;
      --muted: #9b8aa3;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: "Quicksand", system-ui;
    }

    body {
      background: radial-gradient(circle at 20% 10%, rgba(160, 120, 210, 0.05), transparent 8%),
        radial-gradient(circle at 80% 80%, rgba(120, 160, 255, 0.03), transparent 10%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--ink);
      overflow: hidden;
    }

    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 3.5px;
      height: 3.5px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff, rgba(255, 255, 255, 0.55));
      opacity: 0.06;
      filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.06));
      animation: twinkle 4.5s infinite ease-in-out;
    }

    @keyframes twinkle {
      0% {
        opacity: 0.03
      }

      50% {
        opacity: 0.28
      }

      100% {
        opacity: 0.03
      }
    }

    .stage {
      position: relative;
      z-index: 2;
      width: min(1100px, 94vw);
      height: min(740px, 86vh);
      margin: 32px auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #locker {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 8;
      background: linear-gradient(180deg, rgba(2, 2, 6, 0.88), rgba(6, 6, 12, 0.94));
    }

    .locker-card {
      width: 420px;
      max-width: 92vw;
      padding: 28px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.7);
      text-align: center;
      color: var(--ink);
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .locker-card h1 {
      font-family: "Dancing Script", cursive;
      color: var(--accent);
      margin: 6px 0 4px;
      font-size: 34px;
    }

    .locker-card p {
      color: var(--muted);
      margin: 6px 0 14px;
    }

    .locker-input {
      width: 85%;
      padding: 12px 14px;
      border-radius: 10px;
      border: none;
      margin: 8px 0;
      font-size: 16px;
      text-align: center;
      background: rgba(255, 255, 255, 0.02);
      color: var(--ink);
    }

    .locker-btn {
      margin-top: 10px;
      padding: 10px 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: linear-gradient(180deg, var(--accent), #e07fbf);
      color: #06040b;
      font-weight: 700;
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
    }

    #flipbook {
      width: min(980px, 88vw);
      height: min(630px, 78vh);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.7);
      border-radius: 12px;
      overflow: hidden;
      z-index: 3;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.06));
    }

    .page {
      box-sizing: border-box;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.01), rgba(0, 0, 0, 0.03)), var(--page-paper);
      border-left: 6px solid rgba(255, 255, 255, 0.02);
      border-right: 6px solid rgba(0, 0, 0, 0.05);
      padding: 36px;
      color: var(--ink);
      font-family: "Dancing Script", cursive;
      position: relative;
    }

    .page .sheet {
      padding: 18px 30px;
      border-radius: 8px;
    }

    .page .title {
      text-align: center;
      color: var(--accent);
      font-size: 28px;
      margin: 6px 0;
    }

    .page p {
      color: #f6e9f7;
      font-size: 18px;
      line-height: 1.6;
      text-align: center;
      margin: 28px auto;
      max-width: 76%;
    }

    .sticker {
      position: absolute;
      font-size: 28px;
      opacity: 0.9;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.6);
    }

    .sticker.small {
      font-size: 20px;
      opacity: 0.85;
    }

    .controls {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 6;
      display: none;
      gap: 8px;
      align-items: center;
    }

    .control-btn {
      background: rgba(255, 255, 255, 0.04);
      color: var(--ink);
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      backdrop-filter: blur(4px);
    }

    .control-btn:hover {
      transform: translateY(-2px);
      background: rgba(255, 143, 211, 0.3);
    }

    .signature {
      position: absolute;
      bottom: 12px;
      left: 18px;
      color: var(--muted);
      font-size: 13px;
      z-index: 6;
    }
  </style>
</head>

<body>

  <div class="stars" id="stars"></div>

  <div id="locker">
    <div class="locker-card">
      <h1>🔒 Secret Diary</h1>
      <p>Only the invited may open this book.</p>
      <input id="lockerPass" class="locker-input" type="password" placeholder="Enter secret key" />
      <div><button class="locker-btn" id="unlockBtn">Unlock</button></div>
      <div class="hint">Hint: ask your secret friend 😉</div>
    </div>
  </div>

  <div class="stage" aria-hidden="true">
    <div class="controls" id="controls">
      <button id="playPause" class="control-btn">▶ Play</button>
      <button id="first" class="control-btn">« First</button>
      <button id="prev" class="control-btn">‹ Prev</button>
      <button id="next" class="control-btn">Next ›</button>
      <button id="last" class="control-btn">Last »</button>
    </div>

    <div id="flipbook"></div>
    <div class="signature">Made with ❤ — For Shifa</div>
  </div>

  <audio id="bgAudio" loop preload="auto">
    <source src="main-rahun.mp3.mp3" type="audio/mpeg">
  </audio>

  <script>
    const pages = [
      {
        title: "📖 Dear Chachundriiii",
        text: "Tonight feels softer than usual, like the world itself is whispering a quiet secret. It’s the night my princess turns 22 — a moment that feels both gentle and grand at once. If memories could speak, they would tell stories of your laughter, your warmth, and the way you make ordinary days feel rare. This little diary holds fragments of those moments, preserving every smile as if they were meant to last forever."
      },
      {
        text: "✨ The stars seem closer tonight, almost as if they’ve leaned in just to say your name. It’s strange how something so far away can feel so connected, but that’s what you do — you pull even distant things into your orbit. There’s a quiet magic in how the universe responds to you, as if it recognizes something rare and chooses to celebrate it silently."
      },
      {
        text: "🌙 The moon doesn’t just shine tonight — it feels like it borrowed a piece of your glow. There’s a softness in its light, a calm brightness that reminds me of your smile. It’s the kind of presence that doesn’t demand attention, yet somehow becomes impossible to ignore once you notice it."
      },
      {
        text: "👑 In every story worth telling, there’s someone unforgettable — and somehow, that’s always you. Not because of grand gestures or loud moments, but because of your quiet strength and the way you carry yourself. There’s something rare about being both gentle and powerful at the same time, and you manage it effortlessly."
      },
      {
        text: "🌸 Every time you laugh, it feels like the world pauses just for a second. Not in a dramatic way, but in a soft, almost unnoticed shift — like petals falling slowly in the background. It’s the kind of moment that doesn’t need attention to matter, because it’s already perfect as it is."
      },
      {
        text: "🎶 There’s a rhythm to your presence, like a melody that plays softly in the background of everything you do. It’s not loud, not overwhelming, but it stays — lingering in the air long after the moment passes. Some people speak, but you resonate."
      },
      {
        text: "💌 These pages hold more than words — they carry quiet wishes, the kind that don’t need to be spoken out loud. Each one is folded gently into these lines, carrying your name like something fragile and important. Not everything meaningful needs noise; some things are better kept soft."
      },
      {
        text: "💫 At 22, something shifts — not in a loud or dramatic way, but in a quiet, powerful sense of becoming. It’s the age where you begin to see yourself differently, where the world slowly adjusts to who you’re becoming. And somehow, it feels like it’s making space for something brighter."
      },
      {
        text: "🌈 There’s a softness in the way you exist, like colors blending into each other without force. You don’t try to stand out, yet everything around you feels more complete because you’re there. It’s not about being seen — it’s about being felt."
      },
      {
        text: "📖 If stories had a choice, they wouldn’t just tell themselves — they would choose you. Not as a character, but as the reason they exist. Because some people don’t just fit into stories… they give them meaning."
      },
      {
        text: "🕊️ Wishes don’t always come loudly — sometimes they drift quietly, like paper cranes carried by the wind. And somehow, every single one seems to find its way back to you, as if they already know where they belong."
      },
      {
        text: "🌹 Not everything worth saying is big or dramatic. Sometimes it’s the smallest truths that matter the most — the unnoticed, the unspoken, the quietly real. And if I gathered all of those, they would still only begin to describe you."
      },
      {
        text: "⭐ Even the sky seems to rearrange itself in subtle ways, like it’s trying to reflect something it doesn’t fully understand. There’s a kind of beauty in that — in being something even the universe can’t quite replicate."
      },
      {
        text: "💎 Strength doesn’t always look loud or unbreakable. Sometimes it looks like softness, patience, and quiet resilience. You carry that kind of strength — the kind that doesn’t need to prove itself to be real."
      },
      {
        text: "🎂 Twenty-two candles don’t just mark time — they represent moments, growth, memories, and everything in between. Each one carries a small piece of your journey, lighting the way forward without needing to rush."
      },
      {
        text: "🌟 The world doesn’t always stop to notice what makes it better — but it should. Because your presence adds something that can’t be replaced, something that quietly makes everything feel a little more complete."
      },
      {
        text: "💖 Forever is a strange word — too big to fully understand, yet still somehow not enough. But if it means anything at all, it means this: no matter where life goes, I’ll always be rooting for you."
      },
      {
        text: "🌷 There’s a calm kind of beauty in the way you move through life — not forcing anything, not rushing, just existing in a way that feels natural and real. And that’s rarer than most people realize."
      },
      {
        text: "🌼 Time changes everything, but some things remain untouched — like the way certain people leave a lasting impression without even trying. You’re one of those people."
      },
      {
        text: "🌺 Not every presence is loud enough to be remembered, but yours doesn’t need to be. It stays quietly, like a feeling you can’t quite explain but don’t want to lose."
      },
      {
        text: "🌙 Nights like this don’t come often — the kind that feel still, meaningful, and quietly beautiful. And somehow, it feels right that it’s yours."
      },
      {
        title: "🎉 Happy 22nd Birthday, Chachundriii",
        text: "This isn’t just another day — it’s a reminder of everything you are and everything you’re becoming. May life meet you with the same softness you give to it, may happiness find you in unexpected places, and may you always remember how much you mean — not just today, but always."
      }];
    if (pages.length % 2 !== 0) pages.push({ text: "" });

    function buildFlipbook() {
      const fb = $("#flipbook");
      fb.empty();
      pages.forEach((p, idx) => {
        const page = $('<div class="page"></div>');
        const sheet = $('<div class="sheet"></div>');
        if (p.title) sheet.append(`<div class="title">${p.title}</div>`);
        sheet.append(`<p>${p.text}</p>`);
        page.append(sheet);
        if (idx % 5 === 0) page.append('<div class="sticker" style="left:18px;top:12px">✨</div>');
        if (idx % 4 === 0) page.append('<div class="sticker small" style="right:14px;bottom:18px">💖</div>');
        if (idx % 3 === 0) page.append('<div class="sticker small" style="left:22px;bottom:28px">🌸</div>');
        fb.append(page);
      });
      $("#flipbook").turn({ width: fb.width(), height: fb.height(), autoCenter: true, duration: 900 });
    }

    function spawnStars(n = 90) {
      const container = document.getElementById('stars');
      for (let i = 0; i < n; i++) {
        const s = document.createElement('div'); s.className = 'star';
        s.style.left = (Math.random() * 100) + 'vw';
        s.style.top = (Math.random() * 95) + 'vh';
        container.appendChild(s);
      }
    }
    spawnStars();

    const audio = document.getElementById('bgAudio');
    const playBtn = document.getElementById('playPause');

    function tryUnlock() {
      const v = document.getElementById('lockerPass').value.trim();
      if (v === "01234") {
        document.getElementById('locker').style.display = 'none';
        buildFlipbook();
        document.getElementById("controls").style.display = "flex";

        audio.loop = true;
        audio.play().then(() => { playBtn.innerText = "⏸ Pause"; })
          .catch(() => {
            document.body.addEventListener("click", function once() {
              audio.play(); playBtn.innerText = "⏸ Pause";
              document.body.removeEventListener("click", once);
            });
          });

        playBtn.addEventListener("click", () => {
          if (audio.paused) { audio.play(); playBtn.innerText = "⏸ Pause"; }
          else { audio.pause(); playBtn.innerText = "▶ Play"; }
        });

        confetti({ particleCount: 80, spread: 90, origin: { y: 0.6 }, colors: ["#ff99cc", "#66ccff"] });
      } else {
        alert("❌ Wrong key! Try again 😅");
      }
    }

    document.getElementById('unlockBtn').addEventListener('click', tryUnlock);
    document.getElementById('lockerPass').addEventListener('keydown', e => { if (e.key === "Enter") tryUnlock(); });

    document.getElementById('next').addEventListener('click', () => $("#flipbook").turn('next'));
    document.getElementById('prev').addEventListener('click', () => $("#flipbook").turn('previous'));
    document.getElementById('first').addEventListener('click', () => $("#flipbook").turn('page', 1));
    document.getElementById('last').addEventListener('click', () => $("#flipbook").turn('page', pages.length));
    /* keyboard navigation */
    document.addEventListener('keydown', (e) => {
      if (document.getElementById('locker').style.display === 'none') {
        if (e.key === 'ArrowRight') $("#flipbook").turn('next');
        if (e.key === 'ArrowLeft') $("#flipbook").turn('previous');
      }
    });

    /* ----------------- last page ----------------- */
    $(document).on('turn', '#flipbook', function (event, page) {
      if (page >= pages.length - 1) {
        // diary close after 5 sec
        setTimeout(() => {
          try { $("#flipbook").turn('page', 1); } catch (e) { }
          $("#flipbook").fadeOut(1200, () => {
            // bloom effect background
            const bloom = document.createElement("div");
            bloom.style.position = "fixed";
            bloom.style.inset = "0";
            bloom.style.background = "radial-gradient(circle at center, rgba(255,200,240,0.2), transparent 60%), radial-gradient(circle at center, rgba(200,220,255,0.15), transparent 80%)";
            bloom.style.backdropFilter = "blur(4px)";
            bloom.style.zIndex = 20;
            bloom.style.display = "flex";
            bloom.style.alignItems = "center";
            bloom.style.justifyContent = "center";
            bloom.style.flexDirection = "column";
            bloom.style.fontFamily = "'Dancing Script', cursive";
            bloom.style.color = "#ffb3e6";
            bloom.style.fontSize = "36px";
            bloom.innerHTML = "<div style='text-shadow:0 0 15px #fff;'>🌸 The End 🌸<br/>Happy 18th Birthday, Chachundriii 💖</div>";
            document.body.appendChild(bloom);

            // big flower confetti burst
            confetti({
              particleCount: 300,
              spread: 160,
              startVelocity: 45,
              origin: { y: 0.6 },
              colors: ["#ff99cc", "#cc99ff", "#99ccff", "#ffd7a6", "#c2f0c2"]
            });


            /* Parallax effect for stickers + gentle page movement */
            document.addEventListener('mousemove', (e) => {
              const w = window.innerWidth, h = window.innerHeight;
              const nx = (e.clientX / w - 0.5) * 2;
              const ny = (e.clientY / h - 0.5) * 2;
              const bookEl = document.getElementById('book');
              bookEl.style.transform = `translate(${nx * 6}px, ${ny * 4}px)`;
              document.querySelectorAll('.sticker').forEach((el, idx) => {
                const depth = (idx % 3) + 1;
                el.style.transform = `translate(${nx * (6 / depth)}px, ${ny * (6 / depth)}px) rotate(${nx * 6 * depth}deg)`;
              });
            });


            // repeat smaller sparkles for magical bloom
            let bursts = 0;
            const interval = setInterval(() => {
              confetti({
                particleCount: 40,
                spread: 360,
                startVelocity: 30,
                origin: { x: Math.random(), y: Math.random() * 0.6 }
              });
              bursts++; if (bursts > 6) clearInterval(interval);
            }, 400);
          });
        }, 5000); // 🔥 delay = 5 seconds
      }
    });


  </script>
</body>

</html>
